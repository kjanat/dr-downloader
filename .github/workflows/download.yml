# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Download davinci-resolve with Puppeteer
on: { workflow_dispatch: {} }

concurrency: { group: "puppeteer-${{ github.ref_name }}", cancel-in-progress: true }
permissions: { contents: read }

jobs:
  download:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version-file: .node-version }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: latest }
      - uses: kjanat/runner@d489a5d3cd4f5283c11c4fa0b77765d0f02c394a # master
      - run: runner install --frozen dr-downloader
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: davinci-resolve
          path: downloads/
          retention-days: 2
          if-no-files-found: warn
