name: davinci-resolve-downloader
services:
  dr-downloader:
    build: .
    init: true
    cap_add:
      - SYS_ADMIN
    volumes:
      # Mount your local directory to receive the downloaded file
      - ${OUTPUT_DIR:-./downloads}:/app/downloads
    environment:
      # You can override the default output path if needed
      - DEFAULT_OUTPUT_PATH=/app/downloads
    # Remove container after completion
    restart: "no"
    # Optional: Pass additional arguments
    command: ${EXTRA_ARGS:-}

  # Alternative service for one-time runs with a custom output directory
  dr-downloader-custom:
    build: .
    init: true
    cap_add:
      - SYS_ADMIN
    volumes:
      - ${CUSTOM_OUTPUT_DIR}:/app/downloads
    environment:
      - DEFAULT_OUTPUT_PATH=/app/downloads
    restart: "no"
    profiles:
      - custom